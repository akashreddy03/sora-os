name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install xorriso
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso

    - name: Verify xorriso
      run: which xorriso && xorriso --version
    
    - name: Build xtask
      run: cargo build --bin xtask

    - name: Build Kernel
      run: cargo build --bin sora-os --target x86_64-unknown-none
