name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install cargo dependencies
      run : |
        rustup component add rustfmt
        rustup component add clippy

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qemu-system-x86 xorriso

    - name: Format check
      run: cargo fmt --check

    - name: Lint check xtask
      run: cargo clippy -p xtask

    - name: Lint check kernel
      run: cargo clippy -p sora-os --target x86_64-unknown-none
    
    - name: Build xtask
      run: cargo build --bin xtask

    - name: Build Kernel
      run: cargo build --bin sora-os --target x86_64-unknown-none

    - name: Run tests
      run: cargo test -p sora-os --target x86_64-unknown-none
